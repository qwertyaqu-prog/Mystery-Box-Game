<!DOCTYPE html>
<html>
<head>
    <title>Master Admin Kategori</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 20px; }
        h1 { margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .btn-add { background: #3498db; color: white; padding: 15px 30px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 30px; }
        .cat-section { background: #34495e; margin: 0 auto 40px auto; padding: 25px; border-radius: 15px; width: 85%; border: 1px solid #455a64; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        .grid { display: grid; grid-template-columns: repeat(8, 90px); gap: 10px; justify-content: center; margin: 20px 0; min-height: 100px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
        
        /* Penambahan style untuk label huruf */
        .box { width: 90px; height: 90px; background: #e74c3c; border: 2px solid white; cursor: move; overflow: hidden; position: relative; border-radius: 5px; }
        .box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .box span { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 30px; font-weight: bold; color: white; text-shadow: 2px 2px 4px black; 
            pointer-events: none; z-index: 2;
        }
        
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; margin-top: 20px; }
        input[type="text"] { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-save { background: #27ae60; color: white; }
        .btn-shuffle { background: #f1c40f; color: black; }
        .btn-del { background: #c0392b; color: white; margin-top: 20px; font-size: 12px; }
        .sortable-ghost { opacity: 0.4; }
    </style>
</head>
<body>

    <h1>🛠️ Panel Kontrol Multi-Kategori</h1>

    <form method="POST">
        <input type="hidden" name="action" value="add_category">
        <button type="submit" class="btn-add">➕ Tambah Kategori Baru</button>
    </form>

    {% for key, val in cats.items() %}
    <div class="cat-section">
        <h2 style="color: #3498db; margin-top: 0;">📦 Pengaturan: {{ val.name }}</h2>
        
        <div class="grid" id="grid-{{ key }}" data-key="{{ key }}">
            {% for box in val.boxes %}
            <div class="box" data-id="{{ box.id }}">
                <!-- Loop.index0 memberikan angka 0-25 yang dikonversi ke A-Z via JS nanti -->
                <span class="label-huruf"></span>
                <img src="{{ box.content }}">
            </div>
            {% endfor %}
        </div>
        
        <!-- Form lainnya tetap sama -->
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="action" value="update_category">
            <input type="hidden" name="category_key" value="{{ key }}">
            <div class="form-group">
                <div>
                    <label style="font-size: 12px; display: block;">Nama Kategori:</label>
                    <input type="text" name="category_name" value="{{ val.name }}">
                </div>
                <div>
                    <label style="font-size: 12px; display: block;">Pesan Menang:</label>
                    <input type="text" name="congrats_msg" value="{{ val.msg }}">
                </div>
                <div>
                    <label style="font-size: 12px; display: block;">Upload Gambar (A-Z):</label>
                    <input type="file" name="files" multiple accept="image/*">
                </div>
                <button type="submit" class="btn-save">💾 Simpan</button>
                <button type="button" class="btn-shuffle" onclick="doShuffle('{{ key }}')">🔀 Kocok</button>
            </div>
        </form>

        <form method="POST" onsubmit="return confirm('Hapus kategori ini?')" style="border-top: 1px solid #455a64; margin-top: 20px;">
            <input type="hidden" name="action" value="delete_category">
            <input type="hidden" name="category_key" value="{{ key }}">
            <button type="submit" class="btn-del">🗑️ Hapus Kategori</button>
        </form>
    </div>
    {% endfor %}

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        function updateLabels() {
            document.querySelectorAll('.grid').forEach(grid => {
                grid.querySelectorAll('.box').forEach((box, index) => {
                    const label = box.querySelector('.label-huruf');
                    if (label) label.innerText = alphabet[index] || (index + 1);
                });
            });
        }

        document.querySelectorAll('.grid').forEach(grid => {
            new Sortable(grid, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: async function() {
                    updateLabels(); // Perbarui huruf setelah drag n drop
                    const catKey = grid.dataset.key;
                    const newOrder = Array.from(grid.children).map(el => el.dataset.id);
                    await fetch('/api/update_pos', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({cat_key: catKey, new_order: newOrder})
                    });
                }
            });
        });

        async function doShuffle(key) {
            await fetch('/api/shuffle', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cat_key: key}) 
            });
            location.reload();
        }

        // Jalankan saat pertama kali load
        updateLabels();
    </script>
</body>
</html>
